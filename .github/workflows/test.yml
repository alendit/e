name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  elisp:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        emacs-version:
          - 30.2

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Emacs
        uses: jcs090218/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Install Eldev
        uses: emacs-eldev/setup-eldev@v1

      - name: Run tests
        run: eldev -p -dtT test
